<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Components — Tabs</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:16px; background:var(--ll-window-bg); color:var(--ll-fg); font-family:var(--ll-font-sans);}
  .tabs { display:flex;}
  .tab {
    background:var(--ll-input-bg); color:var(--ll-text-secondary);
    padding:6px 14px; border:1px solid var(--ll-border); border-bottom:none;
    font:13px var(--ll-font-sans); cursor:pointer;
    border-top-left-radius:3px; border-top-right-radius:3px;
    margin-right:-1px;
  }
  .tab.active { background:var(--ll-widget-bg); color:var(--ll-text-primary);}
  .pane {
    border:1px solid var(--ll-border); background:var(--ll-widget-bg);
    padding:16px; font-size:13px; color:var(--ll-fg-2);
  }
  .group {
    border:1px solid var(--ll-border); border-radius:var(--ll-radius-md);
    margin-top:14px; padding:12px; position:relative;
  }
  .group-title {
    position:absolute; top:-8px; left:10px; background:var(--ll-widget-bg);
    padding:0 4px; font-size:12px; color:var(--ll-fg);
  }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab">General</div>
    <div class="tab">Playback</div>
    <div class="tab">Chat</div>
    <div class="tab active">Appearance</div>
    <div class="tab">Accounts</div>
  </div>
  <div class="pane">
    <div class="group">
      <div class="group-title">Backgrounds</div>
      <div>Window · Widget · Input · Chat · Toolbar</div>
    </div>
  </div>
</body></html>
