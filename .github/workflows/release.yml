name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build Flatpak on self-hosted Linux runner
  # ──────────────────────────────────────────────
  build-flatpak:
    name: Build Flatpak (Linux)
    runs-on: [self-hosted, linux, x64, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Flatpak in Docker
        run: |
          # Docker-in-Docker: volume mounts don't work because paths are relative to host
          # Use docker cp instead to copy files into/out of container

          # Create container (don't start yet)
          CONTAINER_ID=$(docker create --privileged \
            -w /workspace \
            ghcr.io/flathub-infra/flatpak-github-actions:kde-6.7 \
            bash -c "
              set -e
              # Create machine-id for D-Bus (required by flatpak-builder)
              dbus-uuidgen > /etc/machine-id
              echo 'Contents of /workspace:'
              ls -la /workspace/
              flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
              flatpak install --user -y flathub org.kde.Sdk//6.9 org.kde.Platform//6.9
              flatpak-builder --user --install --force-clean --disable-rofiles-fuse build-dir /workspace/app.livestreamlist.LivestreamListQt.yml
              flatpak build-bundle ~/.local/share/flatpak/repo /workspace/livestreamListQt.flatpak app.livestreamlist.LivestreamListQt
            ")

          echo "Container ID: $CONTAINER_ID"

          # Copy workspace into container
          docker cp "${{ github.workspace }}/." "$CONTAINER_ID:/workspace/"

          # Start container and wait for completion
          docker start -a "$CONTAINER_ID"

          # Copy flatpak out of container
          docker cp "$CONTAINER_ID:/workspace/livestreamListQt.flatpak" "${{ github.workspace }}/livestreamListQt-v${{ steps.version.outputs.VERSION }}.flatpak"

          # Clean up container
          docker rm "$CONTAINER_ID"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: livestreamListQt-v${{ steps.version.outputs.VERSION }}.flatpak

  # ──────────────────────────────────────────────
  # Job 2: Build Windows installer on GitHub-hosted runner
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Download yt-dlp.exe
        shell: pwsh
        run: |
          $ytdlpUrl = (Invoke-RestMethod -Uri "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest").assets |
            Where-Object { $_.name -eq "yt-dlp.exe" } |
            Select-Object -ExpandProperty browser_download_url
          Invoke-WebRequest -Uri $ytdlpUrl -OutFile yt-dlp.exe
          Write-Host "Downloaded yt-dlp.exe"

      - name: Build with PyInstaller
        run: pyinstaller livestream-list-qt.spec --noconfirm

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\iscc.exe" /DAppVersion=${{ steps.version.outputs.VERSION }} installer\livestream-list-qt.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/LivestreamListQt-v${{ steps.version.outputs.VERSION }}-Setup.exe

  # ──────────────────────────────────────────────
  # Job 3: Create GitHub Release with both artifacts
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-flatpak, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Livestream List Qt v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            artifacts/flatpak/livestreamListQt-v${{ steps.version.outputs.VERSION }}.flatpak
            artifacts/windows-installer/LivestreamListQt-v${{ steps.version.outputs.VERSION }}-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
