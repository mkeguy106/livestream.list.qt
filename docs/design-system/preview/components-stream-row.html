<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Components — Stream Row</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--ll-window-bg); color:var(--ll-fg); font-family:var(--ll-font-sans);}
  .list { padding:0;}
  .row { display:grid; grid-template-columns: 16px 16px 1fr auto 180px; gap:10px; align-items:center; padding:6px 14px; border-bottom:1px solid var(--ll-border-light);}
  .row.odd { background:rgba(255,255,255,.04);}
  .row.offline .name, .row.offline .sub { color:var(--ll-text-muted);}
  .dot { width:10px; height:10px; border-radius:50%; background:#4CAF50;}
  .dot.off { background:#999;}
  .badge { font-weight:700; font-size:13px; text-align:center;}
  .main { min-width:0;}
  .name { font-weight:700; font-size:14px;}
  .sub { font-size:12px; color:var(--ll-fg-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px;}
  .viewers { font-weight:600; font-size:13px; font-variant-numeric:tabular-nums; color:var(--ll-fg-2);}
  .actions { display:flex; gap:4px;}
  .ab { width:22px; height:22px; font:700 12px var(--ll-font-sans); display:flex; align-items:center; justify-content:center; border:1px solid var(--ll-border); background:var(--ll-input-bg); border-radius:3px; color:var(--ll-fg);}
</style>
</head>
<body>
  <div class="list">
    <div class="row">
      <span class="dot"></span><span class="badge" style="color:#FF0000">Y</span>
      <div class="main">
        <span class="name" style="color:#FF0000">MrBeast</span>
        <span style="color:var(--ll-fg-2); font-size:12px; margin-left:8px">2 hours 15 minutes</span>
        <div class="sub">Entertainment · LIVE: Building 100 Houses For People In Need</div>
      </div>
      <div class="viewers">127.5K</div>
      <div class="actions"><span class="ab">B</span><span class="ab">C</span><span class="ab">★</span><span class="ab">A</span><span class="ab">▶</span></div>
    </div>
    <div class="row odd">
      <span class="dot"></span><span class="badge" style="color:#9146FF">T</span>
      <div class="main">
        <span class="name" style="color:#9146FF">shroud</span>
        <span style="color:var(--ll-fg-2); font-size:12px; margin-left:8px">3 hours 22 minutes</span>
        <div class="sub">Counter-Strike 2 · CS2 Ranked Grind — Road to Global</div>
      </div>
      <div class="viewers">42.8K</div>
      <div class="actions"><span class="ab">B</span><span class="ab">C</span><span class="ab">★</span><span class="ab">A</span><span class="ab">▶</span></div>
    </div>
    <div class="row offline">
      <span class="dot off"></span><span class="badge" style="color:#9146FF">T</span>
      <div class="main">
        <span class="name">summit1g</span>
        <span style="color:var(--ll-fg-3); font-size:12px; margin-left:8px">6h ago</span>
      </div>
      <div class="viewers"></div>
      <div class="actions"><span class="ab">B</span><span class="ab">C</span><span class="ab">☆</span><span class="ab">A</span><span class="ab">▶</span></div>
    </div>
  </div>
</body></html>
