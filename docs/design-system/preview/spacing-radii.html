<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Spacing & Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:16px; background:var(--ll-window-bg); color:var(--ll-fg); font-family:var(--ll-font-sans);}
  h4 { margin:0 0 8px; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ll-fg-3); font-weight:600;}
  .row { display:flex; gap:12px; align-items:flex-end; margin-bottom:16px;}
  .bar { background:var(--ll-accent); height:20px;}
  .bar-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; font-family:var(--ll-font-mono); font-size:11px; color:var(--ll-fg-3);}
  .rad { width:60px; height:60px; background:var(--ll-widget-bg); border:1px solid var(--ll-border); display:flex; align-items:center; justify-content:center; font-family:var(--ll-font-mono); font-size:11px; color:var(--ll-fg-2);}
</style>
</head>
<body>
  <h4>Spacing scale · 2 / 4 / 6 / 8 / 12 / 16 / 24 / 32</h4>
  <div class="row">
    <div class="bar-wrap"><div class="bar" style="width:2px"></div>2</div>
    <div class="bar-wrap"><div class="bar" style="width:4px"></div>4</div>
    <div class="bar-wrap"><div class="bar" style="width:6px"></div>6</div>
    <div class="bar-wrap"><div class="bar" style="width:8px"></div>8</div>
    <div class="bar-wrap"><div class="bar" style="width:12px"></div>12</div>
    <div class="bar-wrap"><div class="bar" style="width:16px"></div>16</div>
    <div class="bar-wrap"><div class="bar" style="width:24px"></div>24</div>
    <div class="bar-wrap"><div class="bar" style="width:32px"></div>32</div>
  </div>
  <h4>Radii · 3 / 4 / 6 / 24</h4>
  <div class="row">
    <div class="rad" style="border-radius:3px">3</div>
    <div class="rad" style="border-radius:4px">4</div>
    <div class="rad" style="border-radius:6px">6</div>
    <div class="rad" style="border-radius:24px">24</div>
  </div>
</body></html>
