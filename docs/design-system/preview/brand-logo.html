<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Brand — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:16px; background:var(--ll-window-bg); color:var(--ll-fg); font-family:var(--ll-font-sans);}
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; align-items:center;}
  .cell { border:1px solid var(--ll-border); border-radius:var(--ll-radius-md); background:var(--ll-widget-bg); padding:16px; text-align:center; aspect-ratio:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:8px;}
  .cell.light { background:#f5f5f5; color:#1a1a1a; border-color:#ccc;}
  img { display:block;}
  .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ll-fg-3);}
  .cell.light .lbl { color:#666;}
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><img src="../../../data/app.livestreamlist.LivestreamListQt.svg" width="96" height="96"/><div class="lbl">128px · on dark</div></div>
    <div class="cell"><img src="../../../data/app.livestreamlist.LivestreamListQt.svg" width="48" height="48"/><div class="lbl">48px</div></div>
    <div class="cell"><img src="../../../data/app.livestreamlist.LivestreamListQt.svg" width="24" height="24"/><div class="lbl">24px tray</div></div>
    <div class="cell light"><img src="../../../data/app.livestreamlist.LivestreamListQt.svg" width="96" height="96"/><div class="lbl">on light</div></div>
  </div>
</body></html>
