<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Brand — Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:16px; background:var(--ll-window-bg); color:var(--ll-fg); font-family:var(--ll-font-sans);}
  .wrap { display:grid; grid-template-columns:repeat(6,1fr); gap:10px;}
  .cell { border:1px solid var(--ll-border); border-radius:var(--ll-radius-md); background:var(--ll-widget-bg); padding:10px 8px; text-align:center;}
  .glyph { width:24px; height:24px; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--ll-fg);}
  .btn { width:22px; height:22px; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; border:1px solid var(--ll-border); border-radius:var(--ll-radius-sm); background:var(--ll-input-bg);}
  .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--ll-fg-3); margin-top:6px;}
  .led { width:10px; height:10px; border-radius:50%; margin:7px auto;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell"><div class="glyph">+</div><div class="lbl">Add</div></div>
    <div class="cell"><div class="glyph">⟳</div><div class="lbl">Refresh</div></div>
    <div class="cell"><div class="glyph">▶</div><div class="lbl">Play</div></div>
    <div class="cell"><div class="glyph">★</div><div class="lbl">Fav on</div></div>
    <div class="cell"><div class="glyph" style="color:var(--ll-fg-3)">☆</div><div class="lbl">Fav off</div></div>
    <div class="cell"><div class="glyph">×</div><div class="lbl">Close</div></div>

    <div class="cell"><div class="btn">B</div><div class="lbl">Browser</div></div>
    <div class="cell"><div class="btn">C</div><div class="lbl">Chat</div></div>
    <div class="cell"><div class="btn">A</div><div class="lbl">Auto-play</div></div>
    <div class="cell"><div class="btn" style="color:#9146FF">T</div><div class="lbl">Twitch</div></div>
    <div class="cell"><div class="btn" style="color:#53FC18">K</div><div class="lbl">Kick</div></div>
    <div class="cell"><div class="btn" style="color:#F47321">C</div><div class="lbl">CB</div></div>

    <div class="cell"><div class="led" style="background:#4CAF50"></div><div class="lbl">Live</div></div>
    <div class="cell"><div class="led" style="background:#999"></div><div class="lbl">Offline</div></div>
    <div class="cell"><div class="led" style="background:#f44336"></div><div class="lbl">Error</div></div>
    <div class="cell"><div class="led" style="background:#F47321"></div><div class="lbl">Raid</div></div>
    <div class="cell"><div class="led" style="background:#7b5cbf"></div><div class="lbl">Hype</div></div>
    <div class="cell"><div class="led" style="background:#2196F3"></div><div class="lbl">Info</div></div>
  </div>
</body></html>
