name: Update Screenshots

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-screenshots:
    name: Update Screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: true  # Required for git push

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhunspell-dev libegl1

      - name: Install Python dependencies
        run: |
          pip install -e .
          pip install Pillow

      - name: Capture screenshots
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/capture_screenshots.py

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          git diff --cached --quiet || (git commit -m "Update screenshots for $(git describe --tags --abbrev=0)" && git push)
