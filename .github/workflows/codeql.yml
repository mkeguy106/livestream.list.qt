name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        with:
          languages: python
          # Copilot Autofix suggests fixes for found vulnerabilities
          # Enabled automatically for public repos with GitHub Advanced Security

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@480db559a14342288b67e54bd959dd52dc3ee68f # v3
