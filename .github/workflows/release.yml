name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Create a draft release (both build jobs upload to it)
  # ──────────────────────────────────────────────
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create draft release
        uses: softprops/action-gh-release@v1
        with:
          name: Livestream List Qt v${{ steps.version.outputs.VERSION }}
          draft: true
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 2: Build Flatpak on self-hosted Linux runner
  # ──────────────────────────────────────────────
  build-flatpak:
    name: Build Flatpak (Linux)
    needs: create-release
    runs-on: [self-hosted, linux, x64, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update metainfo version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DATE=$(date -u +%Y-%m-%d)
          METAINFO="data/app.livestreamlist.LivestreamListQt.metainfo.xml"
          if ! grep -q "version=\"${VERSION}\"" "$METAINFO"; then
            sed -i "s|<releases>|<releases>\n    <release version=\"${VERSION}\" date=\"${DATE}\"/>|" "$METAINFO"
          fi

      - name: Build Flatpak in Docker
        run: |
          CONTAINER_ID=$(docker create --privileged \
            -w /workspace \
            ghcr.io/flathub-infra/flatpak-github-actions:kde-6.7 \
            bash -c "
              set -e
              dbus-uuidgen > /etc/machine-id
              echo 'Contents of /workspace:'
              ls -la /workspace/
              flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
              flatpak install --user -y flathub org.kde.Sdk//6.9 org.kde.Platform//6.9
              flatpak-builder --user --install --force-clean --disable-rofiles-fuse build-dir /workspace/app.livestreamlist.LivestreamListQt.yml
              flatpak build-bundle ~/.local/share/flatpak/repo /workspace/livestreamListQt.flatpak app.livestreamlist.LivestreamListQt
            ")

          echo "Container ID: $CONTAINER_ID"
          docker cp "${{ github.workspace }}/." "$CONTAINER_ID:/workspace/"
          docker start -a "$CONTAINER_ID"
          docker cp "$CONTAINER_ID:/workspace/livestreamListQt.flatpak" "${{ github.workspace }}/livestreamListQt-v${{ steps.version.outputs.VERSION }}.flatpak"
          docker rm "$CONTAINER_ID"

      - name: Upload Flatpak to release
        uses: softprops/action-gh-release@v1
        with:
          files: livestreamListQt-v${{ steps.version.outputs.VERSION }}.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 3: Build Windows installer on GitHub-hosted runner
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Download yt-dlp.exe
        shell: pwsh
        run: |
          $ytdlpUrl = (Invoke-RestMethod -Uri "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest").assets |
            Where-Object { $_.name -eq "yt-dlp.exe" } |
            Select-Object -ExpandProperty browser_download_url
          Invoke-WebRequest -Uri $ytdlpUrl -OutFile yt-dlp.exe
          Write-Host "Downloaded yt-dlp.exe"

      - name: Build with PyInstaller
        run: pyinstaller livestream-list-qt.spec --noconfirm

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\iscc.exe" /DAppVersion=${{ steps.version.outputs.VERSION }} installer\livestream-list-qt.iss

      - name: Upload installer to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/LivestreamListQt-v${{ steps.version.outputs.VERSION }}-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 4: Update screenshots for README
  # ──────────────────────────────────────────────
  update-screenshots:
    uses: ./.github/workflows/screenshots.yml

  # ──────────────────────────────────────────────
  # Job 5: Publish release (undraft) after both builds succeed
  # ──────────────────────────────────────────────
  publish-release:
    name: Publish Release
    needs: [build-flatpak, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Delete leftover draft release
        run: |
          # softprops/action-gh-release in upload steps can create a second
          # (non-draft) release, leaving the original draft orphaned.
          # Delete any draft releases for this tag.
          gh api repos/${{ github.repository }}/releases --paginate --jq \
            '.[] | select(.draft and .tag_name == "v${{ steps.version.outputs.VERSION }}") | .id' | \
            xargs -I{} gh api -X DELETE repos/${{ github.repository }}/releases/{}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        run: |
          # Undraft the published release (in case it's still a draft)
          gh release edit "v${{ steps.version.outputs.VERSION }}" --draft=false --repo "${{ github.repository }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
