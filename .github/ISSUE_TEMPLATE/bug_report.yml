name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Click on...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Installation Method
      options:
        - Flatpak (Linux)
        - Windows Installer
        - Source (pip install)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: e.g., 0.9.1
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Any relevant error messages or console output
      render: text
