app-id: app.livestreamlist.LivestreamListQt
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: livestream-list-qt

finish-args:
  # Display access
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Network access for API calls
  - --share=network
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # System tray
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.kde.StatusNotifierItem-2-1
  # Open URLs in browser
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.portal.Desktop
  # Keyring for token storage
  - --talk-name=org.freedesktop.secrets
  # Home directory for config (Qt version uses separate dir)
  - --filesystem=~/.config/livestream-list-qt:create
  # Autostart directory for launch on login
  - --filesystem=~/.config/autostart:create
  # Allow running host commands (streamlink, mpv)
  - --talk-name=org.freedesktop.Flatpak

build-options:
  build-args:
    - --share=network

modules:
  # MIT Kerberos — provides libgssapi_krb5.so.2 needed by PySide6's QtWebEngine
  - name: mit-krb5
    buildsystem: simple
    sources:
      - type: archive
        url: https://web.mit.edu/kerberos/krb5/1.22/krb5-1.22.2.tar.gz
        sha256: 002526bb28bb1caf3e2a339a1424adfcaeb96dbe5733c4a0c53862fe0b7f522c
    build-commands:
      - cd src && autoreconf -i
      - cd src && ./configure --prefix=/app --disable-static --enable-shared
      - cd src && make -j$(nproc)
      - cd src && make install

  - name: livestream-list-qt
    buildsystem: simple
    build-commands:
      # KDE SDK ships versioned libhunspell in read-only /usr/lib — create symlink in writable /app/lib
      - |
        target=$(find /usr/lib* -name 'libhunspell*.so*' 2>/dev/null | head -1)
        if [ -n "$target" ]; then
          mkdir -p /app/lib
          ln -sf "$target" /app/lib/libhunspell.so
          echo "Created symlink: /app/lib/libhunspell.so -> $target"
        fi
      - pip3 install --prefix=${FLATPAK_DEST} --no-cache-dir .
      - install -Dm644 data/app.livestreamlist.LivestreamListQt.desktop ${FLATPAK_DEST}/share/applications/app.livestreamlist.LivestreamListQt.desktop
      - install -Dm644 data/app.livestreamlist.LivestreamListQt.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/app.livestreamlist.LivestreamListQt.svg
      - install -Dm644 data/app.livestreamlist.LivestreamListQt-symbolic.svg ${FLATPAK_DEST}/share/icons/hicolor/symbolic/apps/app.livestreamlist.LivestreamListQt-symbolic.svg
      - install -Dm644 data/app.livestreamlist.LivestreamListQt.metainfo.xml ${FLATPAK_DEST}/share/metainfo/app.livestreamlist.LivestreamListQt.metainfo.xml
    sources:
      - type: dir
        path: .
