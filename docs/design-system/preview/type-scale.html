<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:16px; background:var(--ll-window-bg); color:var(--ll-fg); font-family:var(--ll-font-sans);}
  .row { display:grid; grid-template-columns:90px 1fr 80px; gap:10px; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--ll-border-light);}
  .tok { font-family:var(--ll-font-mono); font-size:11px; color:var(--ll-fg-3);}
  .px { font-family:var(--ll-font-mono); font-size:11px; color:var(--ll-fg-3); text-align:right;}
</style>
</head>
<body>
  <div class="row"><div class="tok">text-xs</div><div style="font-size:11px">Timestamps, counters</div><div class="px">11 · 400</div></div>
  <div class="row"><div class="tok">text-sm</div><div style="font-size:12px">Row secondary · "2h 15m" · category</div><div class="px">12 · 400</div></div>
  <div class="row"><div class="tok">text-md</div><div style="font-size:13px">Default body</div><div class="px">13 · 400</div></div>
  <div class="row"><div class="tok">text-base</div><div style="font-size:14px">Primary row text · chat message</div><div class="px">14 · 400</div></div>
  <div class="row"><div class="tok">text-lg</div><div style="font-size:16px">Channel name · banner title</div><div class="px">16 · 700</div></div>
  <div class="row"><div class="tok">text-xl</div><div style="font-size:20px">Section heading</div><div class="px">20 · 600</div></div>
  <div class="row"><div class="tok">text-2xl</div><div style="font-size:24px">Dialog title</div><div class="px">24 · 600</div></div>
</body></html>
